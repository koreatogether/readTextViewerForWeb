<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>readTextViewer v3</title>
    <link rel="stylesheet" href="style-enhanced.css" />
</head>
<body>
    <header class="app-header" id="appHeader">
        <div class="header-title-group">
            <h1>readTextViewer v3</h1>
            <p class="subtitle">창 크기에 맞춰 스크롤 없이 읽는 뷰어</p>
        </div>

        <div class="toolbar" id="dropZone">
            <div class="toolbar-group">
                <button id="openFileBtn">📂 파일 열기</button>
                <input id="fileInput" type="file" accept=".txt" style="display:none;" />
                <button id="loadLast">최근 열기</button>
                <select id="recentFilesList">
                    <option value="">최근 항목</option>
                </select>
            </div>

            <div class="toolbar-group">
                <button id="prevPage">◀ 이전</button>
                <button id="nextPage">다음 ▶</button>
                <span id="pageInfo" class="page-info">
                    <span id="pageModeLabel"></span>
                    <span class="page-separator">·</span>
                    <input id="pageNumberInput" class="page-number-input" type="number" min="1" step="1" inputmode="numeric" aria-label="페이지 번호">
                    <span class="page-separator">/</span>
                    <span id="pageTotalPages"></span>
                    <button id="jumpPageBtn" type="button" class="page-jump-btn">이동</button>
                </span>
            </div>

            <div class="toolbar-group">
                <label class="toolbar-label">글꼴</label>
                <input id="fontSize" type="range" min="12" max="32" value="18" />
                <span id="fontSizeValue">18</span>
                <label class="toolbar-label">줄간격</label>
                <input id="lineHeight" type="range" min="1.0" max="3.0" step="0.1" value="1.6" />
                <span id="lineHeightValue">1.6</span>
            </div>

            <div class="toolbar-group">
                <label class="toolbar-label">보기</label>
                <select id="layoutMode">
                    <option value="auto">자동</option>
                    <option value="double">양면</option>
                    <option value="single">단면</option>
                </select>
                <select id="themeSelect">
                    <option value="white">화이트</option>
                    <option value="dark">다크</option>
                    <option value="sepia">세피아</option>
                </select>
            </div>

            <div class="toolbar-group">
                <input id="searchInput" type="search" placeholder="검색..." />
                <button id="searchPrev">▲</button>
                <button id="searchNext">▼</button>
                <span id="searchInfo" class="search-info"></span>
            </div>

            <div class="toolbar-group">
                <input id="bookmarkName" type="text" placeholder="북마크명" />
                <button id="addBookmark">추가</button>
                <select id="bookmarkList"></select>
                <button id="removeBookmark">삭제</button>
            </div>

            <div class="toolbar-group">
                <button id="exportSettings">설정 저장</button>
                <button id="importSettingsBtn">설정 불러오기</button>
                <input id="settingsInput" type="file" accept=".json" style="display:none;" />
            </div>
        </div>
    </header>

    <main class="reader">
        <div class="page-container" id="pageContainer">
            <section class="page" id="pageLeft"></section>
            <section class="page" id="pageRight"></section>
        </div>
    </main>

    <script src="main.js"></script>
</body>
</html>
